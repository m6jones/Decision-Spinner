<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Plinko - Decision Dropper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            overflow: hidden;
            margin: 0;
            color: white;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .neon-glow {
            text-shadow: 0 0 10px rgba(129, 140, 248, 0.8), 0 0 20px rgba(129, 140, 248, 0.4);
        }

        canvas {
            display: block;
        }

        #ui-overlay {
            pointer-events: none;
        }

        #ui-overlay * {
            pointer-events: auto;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="game-container" class="relative w-full h-screen overflow-hidden">
        <!-- Canvas for Plinko -->
        <canvas id="plinko-canvas"></canvas>

        <!-- UI Overlay -->
        <div id="ui-overlay" class="absolute inset-0 flex flex-col md:flex-row p-4 md:p-8 justify-between">
            <!-- Left Sidebar: Controls -->
            <div class="glass rounded-3xl p-6 w-full md:w-80 h-fit max-h-[80vh] flex flex-col gap-6 shadow-2xl">
                <div>
                    <h1 class="text-2xl font-extralight tracking-widest uppercase mb-1 neon-glow">Zen Plinko</h1>
                    <p class="text-xs text-slate-400 font-light">Drop a marble to decide your fate.</p>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Your Options</label>
                    <textarea 
                        id="options-input" 
                        class="bg-slate-900/50 border border-white/10 rounded-xl p-3 text-sm focus:outline-none focus:border-indigo-500/50 transition-colors h-48 custom-scrollbar resize-none"
                        placeholder="Enter options (one per line)..."
                    >Work Out
Read a Book
Meditate
Quick Nap
Journal</textarea>
                </div>

                <button 
                    id="drop-btn"
                    class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-semibold tracking-wide transition-all active:scale-95 shadow-[0_0_20px_rgba(79,70,229,0.4)]"
                >
                    DROP MARBLE
                </button>
                
                <div class="mt-auto pt-4 border-t border-white/5 flex justify-between items-center">
                    <a href="Spinner.html" class="text-[10px] text-slate-500 hover:text-indigo-400 transition-colors uppercase tracking-widest">Decision Wheel</a>
                    <a href="Spiral.html" class="text-[10px] text-slate-500 hover:text-teal-400 transition-colors uppercase tracking-widest">Calm Mode</a>
                </div>
            </div>

            <!-- Right: Winner Announcement (Hidden by default) -->
            <div id="winner-announcement" class="mt-4 md:mt-0 glass rounded-3xl p-8 w-full md:w-96 h-fit opacity-0 translate-y-4 transition-all duration-700 pointer-events-none self-end md:self-center text-center">
                <p class="text-xs uppercase tracking-[0.3em] text-indigo-400 mb-2">Fate has decided</p>
                <h2 id="winner-text" class="text-4xl font-light text-white mb-6 leading-tight">...</h2>
                <button 
                    id="reset-btn"
                    class="px-8 py-2 border border-white/10 hover:bg-white/5 rounded-full text-xs uppercase tracking-widest transition-colors"
                >
                    Dismiss
                </button>
            </div>
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Vector, Body } = Matter;

        // Constants
        const PENTATONIC = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25]; // C4, D4, E4, G4, A4, C5
        const MARBLE_RADIUS = 10;
        const PEG_RADIUS = 4;
        const WALL_THICKNESS = 60;

        class ZenPlinko {
            constructor() {
                this.canvas = document.getElementById('plinko-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.optionsInput = document.getElementById('options-input');
                this.dropBtn = document.getElementById('drop-btn');
                this.winnerAnnouncement = document.getElementById('winner-announcement');
                this.winnerText = document.getElementById('winner-text');
                this.resetBtn = document.getElementById('reset-btn');

                this.options = [];
                this.marbles = [];
                this.pegs = [];
                this.walls = [];
                this.sensors = [];
                this.isDropping = false;

                this.initAudio();
                this.initPhysics();
                this.initEvents();
                this.resize();
                this.loop();
            }

            initAudio() {
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            playTone(velocity) {
                if (this.audioCtx.state === 'suspended') {
                    this.audioCtx.resume();
                }

                const freq = PENTATONIC[Math.floor(Math.random() * PENTATONIC.length)];
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);

                const volume = Math.min(velocity / 10, 0.3);
                gain.gain.setValueAtTime(volume, this.audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, this.audioCtx.currentTime + 1.5);

                osc.connect(gain);
                gain.connect(this.audioCtx.destination);

                osc.start();
                osc.stop(this.audioCtx.currentTime + 1.5);
            }

            initPhysics() {
                this.engine = Engine.create();
                this.engine.world.gravity.y = 0.6;
                this.runner = Runner.create();
                Runner.run(this.runner, this.engine);
            }

            initEvents() {
                window.addEventListener('resize', () => this.resize());
                
                this.dropBtn.addEventListener('click', () => this.dropMarble());
                
                this.optionsInput.addEventListener('input', () => {
                    this.updateOptions();
                    this.createBoard();
                });

                this.resetBtn.addEventListener('click', () => {
                    this.winnerAnnouncement.style.opacity = '0';
                    this.winnerAnnouncement.style.transform = 'translateY(1rem)';
                });

                Events.on(this.engine, 'collisionStart', (event) => {
                    event.pairs.forEach((pair) => {
                        const { bodyA, bodyB } = pair;
                        
                        // Marble hitting peg
                        if (bodyA.label === 'peg' || bodyB.label === 'peg') {
                            const velocity = Vector.magnitude(bodyA.velocity) + Vector.magnitude(bodyB.velocity);
                            this.playTone(velocity);
                            
                            // Visual feedback for peg
                            const peg = bodyA.label === 'peg' ? bodyA : bodyB;
                            peg.flash = 1.0;
                        }

                        // Marble hitting sensor (basin)
                        if (bodyA.label === 'sensor' || bodyB.label === 'sensor') {
                            const sensor = bodyA.label === 'sensor' ? bodyA : bodyB;
                            const marble = bodyA.label === 'sensor' ? bodyB : bodyA;
                            
                            if (marble.label === 'marble' && !marble.settled) {
                                marble.settled = true;
                                this.announceWinner(sensor.optionIndex);
                                // Fade out marble after a delay
                                setTimeout(() => {
                                    Composite.remove(this.engine.world, marble);
                                    this.marbles = this.marbles.filter(m => m !== marble);
                                }, 2000);
                            }
                        }
                    });
                });

                // Update options initially
                this.updateOptions();
            }

            updateOptions() {
                this.options = this.optionsInput.value
                    .split('\n')
                    .map(s => s.trim())
                    .filter(s => s.length > 0);
                
                if (this.options.length === 0) {
                    this.options = ['No options'];
                }
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.createBoard();
            }

            createBoard() {
                // Clear existing bodies
                if (this.pegs.length > 0) Composite.remove(this.engine.world, this.pegs);
                if (this.walls.length > 0) Composite.remove(this.engine.world, this.walls);
                if (this.sensors.length > 0) Composite.remove(this.engine.world, this.sensors);

                this.pegs = [];
                this.walls = [];
                this.sensors = [];

                const width = this.canvas.width;
                const height = this.canvas.height;
                
                // Adjust for sidebar on desktop
                const playableWidth = window.innerWidth > 768 ? width - 360 : width;
                const startX = window.innerWidth > 768 ? 340 : 0;

                // Create Pegs
                const rows = 9;
                const cols = 12;
                const spacingX = playableWidth / (cols + 1);
                const spacingY = (height * 0.6) / rows;

                for (let r = 0; r < rows; r++) {
                    const rowOffset = r % 2 === 0 ? spacingX / 2 : 0;
                    for (let c = 0; c < (r % 2 === 0 ? cols : cols + 1); c++) {
                        const x = startX + rowOffset + (c + 0.5) * (r % 2 === 0 ? spacingX : spacingX);
                        const y = 150 + r * spacingY;
                        
                        const peg = Bodies.circle(x, y, PEG_RADIUS, {
                            isStatic: true,
                            label: 'peg',
                            render: { fillStyle: '#ffffff' }
                        });
                        peg.flash = 0;
                        this.pegs.push(peg);
                    }
                }

                // Create Walls
                const leftWall = Bodies.rectangle(startX - WALL_THICKNESS/2, height/2, WALL_THICKNESS, height, { isStatic: true });
                const rightWall = Bodies.rectangle(startX + playableWidth + WALL_THICKNESS/2, height/2, WALL_THICKNESS, height, { isStatic: true });
                this.walls.push(leftWall, rightWall);

                // Create Basins/Sensors
                const numBasins = this.options.length;
                const basinWidth = playableWidth / numBasins;

                for (let i = 0; i < numBasins; i++) {
                    const x = startX + i * basinWidth + basinWidth / 2;
                    const y = height - 20;
                    
                    // Invisible sensor to detect landing
                    const sensor = Bodies.rectangle(x, y, basinWidth * 0.8, 40, {
                        isStatic: true,
                        isSensor: true,
                        label: 'sensor'
                    });
                    sensor.optionIndex = i;
                    this.sensors.push(sensor);

                    // Basin dividers
                    if (i > 0) {
                        const divider = Bodies.rectangle(startX + i * basinWidth, height - 50, 4, 100, {
                            isStatic: true,
                            render: { fillStyle: 'rgba(255,255,255,0.1)' }
                        });
                        this.walls.push(divider);
                    }
                }

                Composite.add(this.engine.world, [...this.pegs, ...this.walls, ...this.sensors]);
            }

            dropMarble() {
                if (this.audioCtx.state === 'suspended') {
                    this.audioCtx.resume();
                }

                const width = this.canvas.width;
                const playableWidth = window.innerWidth > 768 ? width - 360 : width;
                const startX = window.innerWidth > 768 ? 340 : 0;
                
                // Randomish starting position at the top
                const x = startX + (Math.random() * 0.4 + 0.3) * playableWidth;
                const y = -50;

                const marble = Bodies.circle(x, y, MARBLE_RADIUS, {
                    restitution: 0.5,
                    friction: 0.001,
                    label: 'marble',
                    render: { fillStyle: '#ffffff' }
                });
                marble.trail = [];
                marble.settled = false;

                this.marbles.push(marble);
                Composite.add(this.engine.world, marble);
                
                // Visual bounce on button
                this.dropBtn.style.transform = 'scale(0.95)';
                setTimeout(() => this.dropBtn.style.transform = '', 100);
            }

            announceWinner(index) {
                const winner = this.options[index];
                this.winnerText.innerText = winner;
                this.winnerAnnouncement.style.opacity = '1';
                this.winnerAnnouncement.style.transform = 'translateY(0)';
                
                // Vibrate if mobile
                if (navigator.vibrate) {
                    navigator.vibrate(200);
                }
            }

            loop() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // Draw Pegs
                this.pegs.forEach(peg => {
                    this.ctx.beginPath();
                    this.ctx.arc(peg.position.x, peg.position.y, PEG_RADIUS, 0, Math.PI * 2);
                    
                    const flash = peg.flash || 0;
                    this.ctx.fillStyle = `rgba(255, 255, 255, ${0.2 + flash * 0.8})`;
                    if (flash > 0) {
                        this.ctx.shadowBlur = 15 * flash;
                        this.ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
                        peg.flash *= 0.9; // Decay
                    } else {
                        this.ctx.shadowBlur = 0;
                    }
                    this.ctx.fill();
                    this.ctx.shadowBlur = 0;
                });

                // Draw Basins/Labels
                const numBasins = this.options.length;
                const width = this.canvas.width;
                const playableWidth = window.innerWidth > 768 ? width - 360 : width;
                const startX = window.innerWidth > 768 ? 340 : 0;
                const basinWidth = playableWidth / numBasins;

                this.ctx.textAlign = 'center';
                this.ctx.font = '10px Inter';
                this.ctx.letterSpacing = '1px';

                this.options.forEach((option, i) => {
                    const x = startX + i * basinWidth + basinWidth / 2;
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    
                    // Truncate option if too long
                    let displayOption = option;
                    if (this.ctx.measureText(displayOption).width > basinWidth - 10) {
                        displayOption = option.substring(0, 10) + '...';
                    }
                    
                    this.ctx.fillText(displayOption.toUpperCase(), x, this.canvas.height - 40);
                });

                // Draw Marbles and Trails
                this.marbles.forEach(marble => {
                    // Update and Draw Trail
                    marble.trail.push({ x: marble.position.x, y: marble.position.y });
                    if (marble.trail.length > 20) marble.trail.shift();

                    if (marble.trail.length > 1) {
                        this.ctx.beginPath();
                        this.ctx.moveTo(marble.trail[0].x, marble.trail[0].y);
                        for (let i = 1; i < marble.trail.length; i++) {
                            this.ctx.lineTo(marble.trail[i].x, marble.trail[i].y);
                        }
                        this.ctx.strokeStyle = `rgba(129, 140, 248, ${marble.settled ? 0.2 : 0.5})`;
                        this.ctx.lineWidth = 4;
                        this.ctx.lineCap = 'round';
                        this.ctx.stroke();
                    }

                    // Draw Marble
                    this.ctx.beginPath();
                    this.ctx.arc(marble.position.x, marble.position.y, MARBLE_RADIUS, 0, Math.PI * 2);
                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.shadowBlur = marble.settled ? 5 : 15;
                    this.ctx.shadowColor = 'rgba(129, 140, 248, 0.8)';
                    this.ctx.fill();
                    this.ctx.shadowBlur = 0;
                });

                requestAnimationFrame(() => this.loop());
            }
        }

        // Initialize game when page loads
        window.onload = () => {
            window.game = new ZenPlinko();
        };
    </script>
</body>
</html>
