<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Plinko - Decision Dropper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            overflow: hidden;
            margin: 0;
            color: white;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .neon-glow {
            text-shadow: 0 0 10px rgba(129, 140, 248, 0.8), 0 0 20px rgba(129, 140, 248, 0.4);
        }

        canvas {
            display: block;
        }

        #ui-overlay {
            pointer-events: none;
        }

        #ui-overlay * {
            pointer-events: auto;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Collapsible Sidebar */
        #sidebar {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }
        
        #sidebar.collapsed {
            transform: translateX(-110%);
            opacity: 0;
            pointer-events: none;
        }

        @media (min-width: 768px) {
            #sidebar.collapsed {
                transform: translateX(-100%) translateX(-2rem);
            }
        }
    </style>
</head>
<body>
    <div id="game-container" class="relative w-full h-screen overflow-hidden">
        <!-- Canvas for Plinko -->
        <canvas id="plinko-canvas"></canvas>

        <!-- UI Overlay -->
        <div id="ui-overlay" class="absolute inset-0 flex p-4 md:p-8 justify-between pointer-events-none">
            
            <!-- Universal Toggle Button -->
            <button 
                id="menu-toggle"
                class="fixed top-4 left-4 z-50 p-3 glass rounded-2xl flex items-center gap-2 text-xs uppercase tracking-widest font-bold text-indigo-300 transition-all active:scale-95"
            >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                <span id="toggle-text">Options</span>
            </button>

            <!-- Sidebar: Controls -->
            <div id="sidebar" class="fixed top-0 left-0 h-full w-[85vw] md:w-80 glass p-6 md:p-8 flex flex-col gap-6 shadow-2xl z-40 collapsed">
                <div class="flex justify-between items-start mt-12 md:mt-0">
                    <div>
                        <h1 class="text-2xl font-extralight tracking-widest uppercase mb-1 neon-glow">Zen Plinko</h1>
                        <p class="text-[10px] text-slate-400 font-light uppercase tracking-wider">The Decision Dropper</p>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Your Options</label>
                    <textarea 
                        id="options-input" 
                        class="bg-slate-900/50 border border-white/10 rounded-xl p-3 text-sm focus:outline-none focus:border-indigo-500/50 transition-colors h-48 md:h-64 custom-scrollbar resize-none"
                        placeholder="Enter options (one per line)..."
                    >Work Out
Read a Book
Meditate
Quick Nap
Journal</textarea>
                </div>

                <div class="flex flex-col gap-3">
                    <button 
                        id="drop-btn"
                        class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-semibold tracking-wide transition-all active:scale-95 shadow-[0_0_20px_rgba(79,70,229,0.3)]"
                    >
                        DROP MARBLE
                    </button>
                    
                    <div class="pt-4 border-t border-white/5 flex flex-col gap-3">
                        <a href="Spinner.html" class="flex items-center justify-between text-[10px] text-slate-500 hover:text-indigo-400 transition-colors uppercase tracking-widest">
                            <span>Decision Wheel</span>
                            <span>→</span>
                        </a>
                        <a href="Spiral.html" class="flex items-center justify-between text-[10px] text-slate-500 hover:text-teal-400 transition-colors uppercase tracking-widest">
                            <span>Calm Mode</span>
                            <span>→</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Winner Announcement (Centered always) -->
            <div id="winner-announcement" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 glass rounded-3xl p-8 w-[90vw] md:w-96 h-fit opacity-0 scale-95 transition-all duration-700 pointer-events-none text-center z-30">
                <p class="text-xs uppercase tracking-[0.3em] text-indigo-400 mb-2">Fate has decided</p>
                <h2 id="winner-text" class="text-3xl md:text-4xl font-light text-white mb-6 leading-tight">...</h2>
                <button 
                    id="reset-btn"
                    class="px-8 py-2 border border-white/10 hover:bg-white/5 rounded-full text-xs uppercase tracking-widest transition-colors"
                >
                    Dismiss
                </button>
            </div>
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Vector, Body } = Matter;

        // Constants
        const PENTATONIC = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
        const MARBLE_RADIUS = 10;
        const PEG_RADIUS = 4;
        const WALL_THICKNESS = 100;

        class ZenPlinko {
            constructor() {
                this.canvas = document.getElementById('plinko-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.optionsInput = document.getElementById('options-input');
                this.dropBtn = document.getElementById('drop-btn');
                this.sidebar = document.getElementById('sidebar');
                this.menuToggle = document.getElementById('menu-toggle');
                this.toggleText = document.getElementById('toggle-text');
                this.winnerAnnouncement = document.getElementById('winner-announcement');
                this.winnerText = document.getElementById('winner-text');
                this.resetBtn = document.getElementById('reset-btn');

                this.options = [];
                this.marbles = [];
                this.pegs = [];
                this.walls = [];
                this.sensors = [];
                
                this.initAudio();
                this.initPhysics();
                this.initEvents();
                this.resize();
                this.loop();
            }

            initAudio() {
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            playTone(velocity) {
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();

                const freq = PENTATONIC[Math.floor(Math.random() * PENTATONIC.length)];
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);

                const volume = Math.min(velocity / 12, 0.25);
                gain.gain.setValueAtTime(volume, this.audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, this.audioCtx.currentTime + 1.2);

                osc.connect(gain);
                gain.connect(this.audioCtx.destination);

                osc.start();
                osc.stop(this.audioCtx.currentTime + 1.2);
            }

            initPhysics() {
                this.engine = Engine.create();
                this.engine.world.gravity.y = 0.55;
                this.runner = Runner.create();
                Runner.run(this.runner, this.engine);
            }

            initEvents() {
                window.addEventListener('resize', () => this.resize());
                
                // Drop on click/tap anywhere on canvas
                this.canvas.addEventListener('click', (e) => {
                    // Don't drop if clicking sidebar or announcement
                    if (this.sidebar.classList.contains('collapsed') || e.clientX > 320) {
                         this.dropAt(e.clientX);
                         if (window.innerWidth <= 768) this.toggleSidebar(false);
                    }
                });

                this.dropBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.dropMarble();
                    this.toggleSidebar(false);
                });

                this.menuToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isCollapsed = this.sidebar.classList.contains('collapsed');
                    this.toggleSidebar(isCollapsed);
                });
                
                this.optionsInput.addEventListener('input', () => {
                    this.updateOptions();
                    this.createBoard();
                });

                this.resetBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.winnerAnnouncement.style.opacity = '0';
                    this.winnerAnnouncement.style.transform = 'translate(-50%, -50%) scale(0.95)';
                    this.winnerAnnouncement.style.pointerEvents = 'none';
                });

                Events.on(this.engine, 'collisionStart', (event) => {
                    event.pairs.forEach((pair) => {
                        const { bodyA, bodyB } = pair;
                        
                        if (bodyA.label === 'peg' || bodyB.label === 'peg') {
                            const velocity = Vector.magnitude(bodyA.velocity) + Vector.magnitude(bodyB.velocity);
                            this.playTone(velocity);
                            const peg = bodyA.label === 'peg' ? bodyA : bodyB;
                            peg.flash = 1.0;
                        }

                        if (bodyA.label === 'sensor' || bodyB.label === 'sensor') {
                            const sensor = bodyA.label === 'sensor' ? bodyA : bodyB;
                            const marble = bodyA.label === 'sensor' ? bodyB : bodyA;
                            
                            if (marble.label === 'marble' && !marble.settled) {
                                marble.settled = true;
                                this.announceWinner(sensor.optionIndex);
                                setTimeout(() => {
                                    Composite.remove(this.engine.world, marble);
                                    this.marbles = this.marbles.filter(m => m !== marble);
                                }, 2500);
                            }
                        }
                    });
                });

                this.updateOptions();
            }

            toggleSidebar(show) {
                if (show) {
                    this.sidebar.classList.remove('collapsed');
                    this.toggleText.innerText = 'Close';
                } else {
                    this.sidebar.classList.add('collapsed');
                    this.toggleText.innerText = 'Options';
                }
            }

            updateOptions() {
                this.options = this.optionsInput.value
                    .split('\n')
                    .map(s => s.trim())
                    .filter(s => s.length > 0);
                if (this.options.length === 0) this.options = ['?'];
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.createBoard();
            }

            createBoard() {
                if (this.pegs.length > 0) Composite.remove(this.engine.world, this.pegs);
                if (this.walls.length > 0) Composite.remove(this.engine.world, this.walls);
                if (this.sensors.length > 0) Composite.remove(this.engine.world, this.sensors);

                this.pegs = [];
                this.walls = [];
                this.sensors = [];

                const width = this.canvas.width;
                const height = this.canvas.height;
                const isMobile = width < 768;
                
                const playableWidth = width;
                const startX = 0;

                // Classic Offset Grid
                const rows = isMobile ? 9 : 11;
                const cols = isMobile ? 8 : 12;
                const spacingX = playableWidth / (cols + 1);
                const spacingY = (height * 0.6) / rows;

                for (let r = 0; r < rows; r++) {
                    const isEven = r % 2 === 0;
                    const rowCols = isEven ? cols : cols + 1;
                    const rowWidth = (rowCols - 1) * spacingX;
                    const rowStartX = (playableWidth - rowWidth) / 2;
                    
                    for (let c = 0; c < rowCols; c++) {
                        const x = rowStartX + c * spacingX;
                        const y = 100 + r * spacingY;
                        
                        const peg = Bodies.circle(x, y, PEG_RADIUS, {
                            isStatic: true,
                            label: 'peg',
                            render: { fillStyle: '#ffffff' }
                        });
                        peg.flash = 0;
                        this.pegs.push(peg);
                    }
                }

                // Walls
                const leftWall = Bodies.rectangle(-WALL_THICKNESS/2, height/2, WALL_THICKNESS, height, { isStatic: true });
                const rightWall = Bodies.rectangle(width + WALL_THICKNESS/2, height/2, WALL_THICKNESS, height, { isStatic: true });
                this.walls.push(leftWall, rightWall);

                // Basins
                const numBasins = this.options.length;
                const basinWidth = playableWidth / numBasins;

                for (let i = 0; i < numBasins; i++) {
                    const x = i * basinWidth + basinWidth / 2;
                    const sensor = Bodies.rectangle(x, height - 10, basinWidth * 0.9, 40, {
                        isStatic: true, isSensor: true, label: 'sensor'
                    });
                    sensor.optionIndex = i;
                    this.sensors.push(sensor);

                    if (i > 0) {
                        const divider = Bodies.rectangle(i * basinWidth, height - 40, 2, 80, {
                            isStatic: true, render: { fillStyle: 'rgba(255,255,255,0.1)' }
                        });
                        this.walls.push(divider);
                    }
                }

                Composite.add(this.engine.world, [...this.pegs, ...this.walls, ...this.sensors]);
            }

            dropAt(x) {
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
                const y = -30;
                const marble = Bodies.circle(x, y, MARBLE_RADIUS, {
                    restitution: 0.6, friction: 0.001, label: 'marble'
                });
                marble.trail = [];
                marble.settled = false;
                this.marbles.push(marble);
                Composite.add(this.engine.world, marble);
            }

            dropMarble() {
                const x = (Math.random() * 0.4 + 0.3) * this.canvas.width;
                this.dropAt(x);
            }

            announceWinner(index) {
                const winner = this.options[index];
                this.winnerText.innerText = winner;
                this.winnerAnnouncement.style.opacity = '1';
                this.winnerAnnouncement.style.transform = 'translate(-50%, -50%) scale(1)';
                this.winnerAnnouncement.style.pointerEvents = 'auto';
                if (navigator.vibrate) navigator.vibrate(200);
            }

            loop() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                this.pegs.forEach(peg => {
                    this.ctx.beginPath();
                    this.ctx.arc(peg.position.x, peg.position.y, PEG_RADIUS, 0, Math.PI * 2);
                    const flash = peg.flash || 0;
                    this.ctx.fillStyle = `rgba(255, 255, 255, ${0.15 + flash * 0.85})`;
                    if (flash > 0) {
                        this.ctx.shadowBlur = 12 * flash;
                        this.ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
                        peg.flash *= 0.92;
                    }
                    this.ctx.fill();
                    this.ctx.shadowBlur = 0;
                });

                const numBasins = this.options.length;
                const basinWidth = this.canvas.width / numBasins;

                this.ctx.textAlign = 'center';
                this.ctx.font = '10px Inter';
                this.ctx.letterSpacing = '1px';

                this.options.forEach((option, i) => {
                    const x = i * basinWidth + basinWidth / 2;
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    let displayOption = option.toUpperCase();
                    if (this.ctx.measureText(displayOption).width > basinWidth - 10) {
                        displayOption = displayOption.substring(0, Math.floor(basinWidth/8)) + '..';
                    }
                    this.ctx.fillText(displayOption, x, this.canvas.height - 25);
                });

                this.marbles.forEach(marble => {
                    // Safety check if marble falls out of world
                    if (marble.position.y > this.canvas.height + 100) {
                        Composite.remove(this.engine.world, marble);
                        this.marbles = this.marbles.filter(m => m !== marble);
                        return;
                    }

                    marble.trail.push({ x: marble.position.x, y: marble.position.y });
                    if (marble.trail.length > 15) marble.trail.shift();

                    if (marble.trail.length > 1) {
                        this.ctx.beginPath();
                        this.ctx.moveTo(marble.trail[0].x, marble.trail[0].y);
                        for (let i = 1; i < marble.trail.length; i++) {
                            this.ctx.lineTo(marble.trail[i].x, marble.trail[i].y);
                        }
                        this.ctx.strokeStyle = `rgba(129, 140, 248, ${marble.settled ? 0.15 : 0.45})`;
                        this.ctx.lineWidth = 3;
                        this.ctx.lineCap = 'round';
                        this.ctx.stroke();
                    }

                    this.ctx.beginPath();
                    this.ctx.arc(marble.position.x, marble.position.y, MARBLE_RADIUS, 0, Math.PI * 2);
                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.shadowBlur = marble.settled ? 4 : 15;
                    this.ctx.shadowColor = 'rgba(129, 140, 248, 0.8)';
                    this.ctx.fill();
                    this.ctx.shadowBlur = 0;
                });

                requestAnimationFrame(() => this.loop());
            }
        }

        window.onload = () => { window.game = new ZenPlinko(); };
    </script>
</body>
</html>
