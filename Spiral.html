<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rainbow Breath - Calm Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
            touch-action: none;
        }
        canvas {
            display: block;
            touch-action: none;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }
        .breathe {
            animation: breathe 8s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.6; }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen cursor-crosshair">

    <div class="fixed top-6 left-6 z-20 flex items-center gap-4">
        <a href="Spinner.html" class="px-4 py-2 bg-white/5 hover:bg-white/10 text-white/40 hover:text-white/80 rounded-full border border-white/10 transition-all text-sm font-medium backdrop-blur-sm">
            ← Back to Spinner
        </a>
    </div>

    <div class="fixed inset-0 flex items-center justify-center pointer-events-none z-10">
        <div id="instruction" class="text-indigo-200/40 text-2xl md:text-3xl font-light tracking-widest text-center transition-opacity duration-1000 uppercase">
            Trace the spiral slowly
        </div>
    </div>

    <!-- Breathing Guide Circle -->
    <div class="fixed inset-0 flex items-center justify-center pointer-events-none">
        <div class="w-64 h-64 md:w-96 md:h-96 rounded-full border border-indigo-500/10 breathe"></div>
        <div class="absolute w-48 h-48 md:w-72 md:h-72 rounded-full border border-indigo-400/5 breathe" style="animation-delay: 1s;"></div>
    </div>

    <canvas id="spiralCanvas"></canvas>

    <script>
        const canvas = document.getElementById('spiralCanvas');
        const ctx = canvas.getContext('2d');
        const instruction = document.getElementById('instruction');

        let width, height;
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let hue = 0;
        let points = [];
        const maxPoints = 3000;
        const fadeSpeed = 0.005;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
        }

        window.addEventListener('resize', resize);
        resize();

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;
            instruction.style.opacity = '0';
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            const dist = Math.hypot(pos.x - lastX, pos.y - lastY);
            if (dist < 2) return;

            hue = (hue + dist * 0.5) % 360;

            const point = {
                x1: lastX,
                y1: lastY,
                x2: pos.x,
                y2: pos.y,
                color: `hsla(${hue}, 80%, 60%, 1)`,
                opacity: 1,
                width: 18
            };

            points.push(point);
            if (points.length > maxPoints) points.shift();

            lastX = pos.x;
            lastY = pos.y;
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startDrawing(e);
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            draw(e);
        }, { passive: false });
        window.addEventListener('touchend', stopDrawing);

        const breathingPhrases = ["Breathe in...", "Hold...", "Breathe out...", "Pause..."];
        let phraseIndex = 0;
        
        setInterval(() => {
            if (instruction.style.opacity === '0') {
                instruction.textContent = breathingPhrases[phraseIndex];
                instruction.style.opacity = '0.4';
                setTimeout(() => {
                    instruction.style.opacity = '0';
                }, 4000);
                phraseIndex = (phraseIndex + 1) % breathingPhrases.length;
            }
        }, 8000);

        function drawGuide() {
            const centerX = width / 2;
            const centerY = height / 2;
            const a = 0;
            const b = Math.min(width, height) * 0.015;
            const rotations = 6;
            
            ctx.beginPath();
            ctx.setLineDash([5, 15]);
            ctx.lineWidth = 2;
            ctx.strokeStyle = 'rgba(129, 140, 248, 0.15)';
            
            for (let theta = 0; theta < Math.PI * 2 * rotations; theta += 0.1) {
                const r = a + b * theta;
                const x = centerX + r * Math.cos(theta);
                const y = centerY + r * Math.sin(theta);
                if (theta === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            drawGuide();
            for (let i = 0; i < points.length; i++) {
                const p = points[i];
                p.opacity -= fadeSpeed;
                if (p.opacity <= 0) {
                    points.splice(i, 1);
                    i--;
                    continue;
                }
                ctx.beginPath();
                ctx.moveTo(p.x1, p.y1);
                ctx.lineTo(p.x2, p.y2);
                ctx.strokeStyle = p.color.replace('1)', `${p.opacity})`);
                ctx.lineWidth = p.width;
                ctx.lineCap = 'round';
                ctx.shadowBlur = 15 * p.opacity;
                ctx.shadowColor = p.color;
                ctx.stroke();
            }
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
